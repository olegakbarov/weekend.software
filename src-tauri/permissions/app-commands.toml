"$schema" = "schemas/schema.json"

[[permission]]
identifier = "allow-app-commands"
description = "Enables core app commands used by the local frontend."
commands.allow = [
  "create_new_project",
  "presets_list_dirs",
  "presets_read_manifest",
  "create_from_preset",
  "open_external_url",
  "shared_assets_list",
  "shared_assets_upload_batch",
  "shared_assets_import_paths",
  "shared_assets_rename",
  "shared_assets_delete",
  "list_projects",
  "project_config_read",
  "project_config_write",
  "delete_project",
  "archive_project",
  "unarchive_project",
  "rename_project",
  "list_project_tree",
  "read_project_file",
  "write_project_file",
  "read_project_file_binary",
  "rename_project_path",
  "delete_project_path",
  "git_changed_files",
  "git_changed_files_with_diffs",
  "git_diff_file",
  "import_external_files_to_project",
  "terminal_open",
  "terminal_write",
  "terminal_resize",
  "terminal_close",
  "terminal_list",
  "terminal_active_processes",
  "terminal_get_all_sessions",
  "terminal_set_custom_name",
  "terminal_remove_session",
  "browser_history_navigate",
  "browser_close_stale_webviews",
  "browser_probe_runtime_url",
  "browser_start_element_grab",
  "browser_stop_element_grab",
  "browser_eval_result",
  "browser_capture_screenshot",
  "project_save_preview",
  "project_load_preview",
  "runtime_debug_dump",
  "ui_log_batch",
  "logs_read_weekend",
  "logs_read_project",
  "get_active_theme",
  "set_active_theme",
  "get_design_system_config",
  "set_design_system_config",
  "sync_design_system_into_all_projects",
  "shell_name",
  "set_traffic_lights_visible",
  "find_available_port",
  "probe_runtime_url"
]

