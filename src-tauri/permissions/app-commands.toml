"$schema" = "schemas/schema.json"

[[permission]]
identifier = "allow-app-commands"
description = "Enables core app commands used by the local frontend."
commands.allow = [
  "create_new_project",
  "shared_assets_list",
  "shared_assets_upload_batch",
  "list_projects",
  "project_config_read",
  "project_config_write",
  "delete_project",
  "archive_project",
  "unarchive_project",
  "rename_project",
  "list_project_tree",
  "read_project_file",
  "write_project_file",
  "read_project_file_binary",
  "rename_project_path",
  "delete_project_path",
  "import_external_files_to_project",
  "terminal_open",
  "terminal_write",
  "terminal_resize",
  "terminal_close",
  "terminal_list",
  "terminal_active_processes",
  "terminal_get_all_sessions",
  "terminal_set_custom_name",
  "terminal_remove_session",
  "browser_history_navigate",
  "browser_probe_runtime_url",
  "browser_start_element_grab",
  "browser_stop_element_grab",
  "browser_eval_result",
  "runtime_debug_dump",
  "ui_log_batch",
  "logs_read_weekend",
  "logs_read_project",
  "shell_name",
  "find_available_port",
  "probe_runtime_url"
]

[[permission]]
identifier = "deny-app-commands"
description = "Denies core app commands used by the local frontend."
commands.deny = [
  "create_new_project",
  "shared_assets_list",
  "shared_assets_upload_batch",
  "list_projects",
  "project_config_read",
  "project_config_write",
  "delete_project",
  "archive_project",
  "unarchive_project",
  "rename_project",
  "list_project_tree",
  "read_project_file",
  "write_project_file",
  "read_project_file_binary",
  "rename_project_path",
  "delete_project_path",
  "import_external_files_to_project",
  "terminal_open",
  "terminal_write",
  "terminal_resize",
  "terminal_close",
  "terminal_list",
  "terminal_active_processes",
  "terminal_get_all_sessions",
  "terminal_set_custom_name",
  "terminal_remove_session",
  "browser_history_navigate",
  "browser_probe_runtime_url",
  "browser_start_element_grab",
  "browser_stop_element_grab",
  "browser_eval_result",
  "runtime_debug_dump",
  "ui_log_batch",
  "logs_read_weekend",
  "logs_read_project",
  "shell_name",
  "find_available_port",
  "probe_runtime_url"
]
