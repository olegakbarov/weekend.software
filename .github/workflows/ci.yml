name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Lint, typecheck, tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Token drift check (legacy class-based vs canonical data-theme)
        run: pnpm tokens:lint:check

      - name: Design consumer manifests up to date
        run: pnpm design:index:check

      - name: Design package typecheck
        run: pnpm --filter @weekend/design typecheck

      - name: Design package tests
        run: pnpm --filter @weekend/design test
